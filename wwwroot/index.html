<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./public/css/styles.css" />
        <title>Login</title>
    </head>
    <body>
        <section class="index-container">
            <div class="login-container__box">
                <form method="post" class="form-container">
                    <fieldset class="form-container__sign-in">
                        <h2 class="form-container__title">Login</h2>
                        <div class="form-container__box">
                            <div class="form-container__box-input">
                                <label for="username-sign-in"
                                    ><img
                                        src="public/icons/person-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="username-sign-in"
                                    name="username"
                                    required
                                />
                            </div>
                            <div class="form-container__box-input">
                                <button
                                    type="button"
                                    class="form-container__btn"
                                    name="password-sign-in"
                                >
                                    <img
                                        src="public/icons/eye-slash-fill.svg"
                                        alt="password icon"
                                        class="form-container__img"
                                    />
                                </button>
                                <input
                                    type="password"
                                    id="password-sign-in"
                                    name="password"
                                    class="form-container__input-password"
                                    required
                                />
                            </div>
                        </div>
                        <button
                            type="submit"
                            class="generic-btn"
                            name="sign-in"
                        >
                            Enviar
                        </button>
                    </fieldset>
                    <fieldset class="form-container__sign-up">
                        <h2 class="form-container__title">Cadastrar</h2>
                        <div class="form-container__box">
                            <div class="form-container__box-input">
                                <label for="username-sign-up"
                                    ><img
                                        src="public/icons/person-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="username-sign-up"
                                    name="username"
                                    required
                                    disabled
                                />
                            </div>
                            <div class="form-container__box-input">
                                <label for="email"
                                    ><img
                                        src="public/icons/envelope-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="email"
                                    name="email"
                                    required
                                    disabled
                                />
                            </div>
                            <div class="form-container__box-input">
                                <label for="email-check"
                                    ><img
                                        src="public/icons/envelope-check-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="email-check"
                                    name="email-check"
                                    required
                                    disabled
                                />
                            </div>

                            <div class="form-container__box-input">
                                <button
                                    type="button"
                                    class="form-container__btn"
                                    name="password-sign-up"
                                >
                                    <img
                                        src="public/icons/eye-slash-fill.svg"
                                        alt="password icon"
                                        class="form-container__img"
                                    />
                                </button>
                                <input
                                    type="password"
                                    id="password-sign-up"
                                    name="password"
                                    class="form-container__input-password"
                                    required
                                    disabled
                                />
                            </div>
                        </div>
                        <button
                            type="button"
                            class="generic-btn"
                            name="sign-up"
                        >
                            Cadastrar
                        </button>
                    </fieldset>
                    <button type="submit" class="signIn-and-signUp">
                        cadastrar-se
                    </button>
                </form>
            </div>
        </section>
        <script type="module" src="/script/index.js"></script>
    </body>
</html>
