<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./public/css/styles.css" />
        <title>Login</title>
    </head>
    <body>
        <section class="index-container">
            <div class="login-container__box">
                <form method="post" class="form-container">
                    <fieldset class="form-container__sign-in">
                        <h2 class="form-container__title">Login</h2>
                        <div class="form-container__box">
                            <div class="form-container__box-input">
                                <label for="username-signIn"
                                    ><img
                                        src="public/icons/person-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="username-signIn"
                                    name="username"
                                    required
                                />
                            </div>
                            <div class="form-container__box-input">
                                <button
                                    type="button"
                                    class="form-container__btn"
                                    onclick="handlerPassword()"
                                >
                                    <img
                                        src="public/icons/eye-slash-fill.svg"
                                        alt="password icon"
                                        class="form-container__img"
                                    />
                                </button>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-container__input-password"
                                    required
                                />
                            </div>
                        </div>
                        <button class="generic-btn" onclick="handlerLogin()">
                            Enviar
                        </button>
                    </fieldset>
                    <fieldset class="form-container__sign-up">
                        <h2 class="form-container__title">Cadastrar</h2>
                        <div class="form-container__box">
                            <div class="form-container__box-input">
                                <label for="username-signUp"
                                    ><img
                                        src="public/icons/person-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="username-signUp"
                                    name="username"
                                    required
                                />
                            </div>
                            <div class="form-container__box-input">
                                <label for="email"
                                    ><img
                                        src="public/icons/envelope-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="email"
                                    name="email"
                                    required
                                />
                            </div>
                            <div class="form-container__box-input">
                                <label for="email-check"
                                    ><img
                                        src="public/icons/envelope-check-fill.svg"
                                        alt="person icon"
                                /></label>
                                <input
                                    type="text"
                                    id="email-check"
                                    name="email-check"
                                    required
                                />
                            </div>

                            <div class="form-container__box-input">
                                <button
                                    type="button"
                                    class="form-container__btn"
                                    onclick="handlerPassword()"
                                >
                                    <img
                                        src="public/icons/eye-slash-fill.svg"
                                        alt="password icon"
                                        class="form-container__img"
                                    />
                                </button>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-container__input-password"
                                    required
                                />
                            </div>
                        </div>
                        <button class="generic-btn" onclick="handlerSignUp()">
                            Cadastrar
                        </button>
                    </fieldset>
                    <button
                        type="button"
                        class="signIn-and-signUp"
                        onclick="handlerLoginSwitch()"
                    >
                        cadastrar-se
                    </button>
                </form>
            </div>
        </section>
        <script src="script/index.js"></script>
    </body>
</html>
